<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Work Term Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>My Work Term Reports</h1>
      <p class="content-subtitle">Upload and review your submitted work term reports.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Latest Upload</span>
          <span class="stat-value" id="studentReportLatestUpload">No uploads yet</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><polyline points="14 3 14 8 19 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Reports</span>
          <span class="stat-value" id="studentReportCount">0</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="content-column">
        <div class="column-card">
          <h2 class="column-title">My Reports</h2>
          <div class="terms-list" id="studentReportList">
            <div class="applications-empty-state">Loading reports...</div>
          </div>
        </div>
      </div>

      <div class="content-column">
        <div class="report-side-stack">
          <div class="column-card">
            <h2 class="column-title">Upload Report</h2>
            <div class="report-upload-form">
              <div class="form-group">
                <label for="studentReportCompanyInput">Company Name</label>
                <input type="text" id="studentReportCompanyInput" placeholder="Enter company name">
              </div>
              <div class="form-group">
                <label for="studentReportJobTitleInput">Job Title</label>
                <input type="text" id="studentReportJobTitleInput" placeholder="Enter job title">
              </div>
              <div class="form-group">
                <label>Work Term Report</label>
                <div class="report-upload-picker">
                  <input class="hidden-file-input" type="file" id="studentReportFileInput" accept=".pdf,application/pdf">
                  <button class="quick-view-btn" type="button" data-file-trigger="studentReportFileInput">Choose PDF</button>
                  <span class="report-upload-file-name" id="studentReportFileStatus">No file selected</span>
                </div>
                <p class="application-card-note">PDF only. Maximum file size: 5 MB.</p>
              </div>
              <p class="application-card-note" id="studentReportSubmissionRuleMessage"></p>
              <p class="upload-error-message" id="studentReportUploadError" hidden></p>
              <div class="upload-submit-row">
                <button class="btn-primary" id="studentReportSubmitBtn" type="button" disabled>Submit Report</button>
              </div>
            </div>
          </div>
          <div class="column-card">
            <h2 class="column-title">Report Due Date</h2>
            <div class="report-due-date-display" id="studentReportDueDateDisplay">No Due Date</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
