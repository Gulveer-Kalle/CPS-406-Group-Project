<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Evaluation Reports - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/forms.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Evaluation Reports</h1>
      <p class="content-subtitle">Upload evaluation reports for requested students assigned to your company.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Assigned Students</span>
          <span class="stat-value" id="employerEvaluationAssignedCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><path d="M8.5 11.5 3 17a2 2 0 0 0 1.4 3.4h15.2A2 2 0 0 0 21 17l-5.5-5.5"/><path d="M12 16h.01"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Pending Requests</span>
          <span class="stat-value" id="employerEvaluationPendingCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="17 3 21 3 21 7"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="9" y1="13" x2="9.01" y2="13"/><line x1="9" y1="17" x2="9.01" y2="17"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Submitted Reports</span>
          <span class="stat-value" id="employerEvaluationSubmittedCount">0</span>
        </div>
      </div>
    </div>

    <div class="column-card">
      <h2 class="column-title">Requested Evaluation Reports</h2>
      <div class="applications-list" id="employerEvaluationList">
        <div class="applications-empty-state">Loading evaluation requests...</div>
      </div>
    </div>
  </div>
</body>
</html>
