<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Employees</h1>
      <p class="content-subtitle">Students assigned to your employer account.</p>
    </div>

    <div class="stats-grid coordinator-report-stats">
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Assigned Employees</span>
          <span class="stat-value" id="employerAssignedEmployeeCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Employees With Email</span>
          <span class="stat-value" id="employerAssignedEmployeeEmailCount">0</span>
        </div>
      </div>
    </div>

    <div class="coordinator-applications-filter">
      <div class="form-group">
        <label for="employerEmployeeSearch">Search Employees</label>
        <input type="text" id="employerEmployeeSearch" placeholder="Search by name or email">
      </div>
    </div>

    <div class="column-card">
      <h2 class="column-title">Employee List</h2>
      <div class="applications-list" id="employerEmployeesList">
        <div class="applications-empty-state">Loading assigned employees...</div>
      </div>
    </div>
  </div>
</body>
</html>
