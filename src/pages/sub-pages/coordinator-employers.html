<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employers - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Employers</h1>
      <p class="content-subtitle">See which students are assigned to each employer.</p>
    </div>

    <div class="stats-grid coordinator-report-stats">
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Active Employers</span>
          <span class="stat-value" id="coordinatorEmployerCount">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-content">
          <span class="stat-title">Assigned Students</span>
          <span class="stat-value" id="coordinatorEmployerAssignedStudentCount">0</span>
        </div>
      </div>
    </div>

    <div class="coordinator-applications-filter">
      <div class="form-group">
        <label for="coordinatorEmployerSearch">Search Employers</label>
        <input type="text" id="coordinatorEmployerSearch" placeholder="Search by employer or student name">
      </div>
    </div>

    <div class="column-card">
      <h2 class="column-title">Employer Partners</h2>
      <div class="applications-list" id="coordinatorEmployerList">
        <div class="applications-empty-state">Loading employers...</div>
      </div>
    </div>
  </div>
</body>
</html>
