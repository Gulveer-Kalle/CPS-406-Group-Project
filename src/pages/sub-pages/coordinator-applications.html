<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications - Co-op Connect</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
  <div class="subscreen-container">
    <div class="content-header">
      <h1>Applications</h1>
      <p class="content-subtitle">Review student application documents and update application decisions.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-content">
          <span class="stat-title">Total Students</span>
          <span class="stat-value" id="coordinatorApplicationsTotal">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📤</div>
        <div class="stat-content">
          <span class="stat-title">Uploaded</span>
          <span class="stat-value" id="coordinatorApplicationsUploaded">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-content">
          <span class="stat-title">Pending / In Process</span>
          <span class="stat-value" id="coordinatorApplicationsOpen">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-content">
          <span class="stat-title">Approved</span>
          <span class="stat-value" id="coordinatorApplicationsApproved">0</span>
        </div>
      </div>
    </div>

    <div class="column-card">
      <h2 class="column-title">Student Applications</h2>
      <div class="filter-bar coordinator-applications-filter">
        <div class="form-group">
          <label for="coordinatorApplicationSearch">Search by Name</label>
          <input type="text" id="coordinatorApplicationSearch" placeholder="Search student name">
        </div>
        <div class="form-group">
          <label for="coordinatorApplicationStatusFilter">Filter by Status</label>
          <select id="coordinatorApplicationStatusFilter">
            <option value="all">All Statuses</option>
            <option value="not_submitted">Not Submitted</option>
            <option value="pending">Pending</option>
            <option value="in_process">In Process</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
      </div>
      <div class="applications-list" id="coordinatorApplicationsList">
        <div class="applications-empty-state">Loading student applications...</div>
      </div>
    </div>
  </div>
</body>
</html>
