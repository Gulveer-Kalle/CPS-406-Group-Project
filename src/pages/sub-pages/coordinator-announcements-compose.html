<div class="subscreen-container">
  <div class="content-header">
    <h1>Email Composer</h1>
    <p class="content-subtitle">Demo announcement page for coordinators. This mimics an email tool and does not send real email.</p>
  </div>

  <div class="dashboard-grid">
    <div class="content-column">
      <div class="column-card announcement-compose-card">
        <div class="announcement-compose-toolbar">
          <span class="profile-chip">Draft</span>
          <span class="profile-chip subtle">Demo Mode</span>
        </div>

        <form id="coordinatorAnnouncementComposeForm" class="announcement-compose-form">
          <div class="announcement-compose-field">
            <label for="coordinatorAnnouncementTo">To</label>
            <div
              id="coordinatorAnnouncementTo"
              class="announcement-compose-display"
            >Assigned Students</div>
          </div>

          <div class="announcement-compose-field">
            <label for="coordinatorAnnouncementCc">Cc</label>
            <div
              id="coordinatorAnnouncementCc"
              class="announcement-compose-display"
            >None</div>
          </div>

          <div class="announcement-compose-field">
            <label for="coordinatorAnnouncementSubject">Subject</label>
            <input
              id="coordinatorAnnouncementSubject"
              class="announcement-compose-input"
              type="text"
              placeholder="Enter announcement subject"
            >
          </div>

          <div class="announcement-compose-field">
            <label for="coordinatorAnnouncementMessage">Message</label>
            <textarea
              id="coordinatorAnnouncementMessage"
              class="announcement-compose-input announcement-compose-textarea"
              rows="10"
              placeholder="Write your announcement here..."
            ></textarea>
          </div>

          <div class="announcement-compose-actions">
            <button type="submit" class="btn-primary">Send Email</button>
            <button type="button" class="quick-view-btn" id="coordinatorAnnouncementPreviewBtn">Preview</button>
            <button type="button" class="quick-view-btn" id="coordinatorAnnouncementCancelBtn">Cancel</button>
          </div>
        </form>

        <div id="coordinatorAnnouncementStatus" class="announcement-compose-status" hidden></div>
      </div>
    </div>

    <div class="content-column">
      <div class="column-card announcement-preview-card" id="coordinatorAnnouncementPreviewCard">
        <h2 class="column-title">Preview</h2>
        <div class="announcement-preview-shell">
          <div class="announcement-preview-header">
            <div class="announcement-preview-avatar">CC</div>
            <div class="announcement-preview-header-copy">
              <span class="announcement-preview-from">Co-op Connect Announcements</span>
              <span id="coordinatorAnnouncementPreviewTo" class="announcement-preview-recipient">To: Assigned Students</span>
            </div>
          </div>
          <div class="announcement-preview-meta">
            <span id="coordinatorAnnouncementPreviewSubject">Subject: -</span>
          </div>
          <div id="coordinatorAnnouncementPreviewBody" class="announcement-preview-body">Your message preview will appear here.</div>
        </div>
      </div>
    </div>
  </div>
</div>
