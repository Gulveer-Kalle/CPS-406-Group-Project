<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Co-op Connect</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
  <div class="login-container">
    <!-- Left Side: Logo and Branding -->
    <div class="login-left">
      <div class="logo-section">
        <svg class="logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="95" fill="none" stroke="#FFA500" stroke-width="8"/>
          <!-- Handshake -->
          <g transform="translate(50, 60)">
            <!-- Left hand (dark blue) -->
            <path d="M 20 30 Q 15 20 10 15 Q 8 12 5 15 Q 3 18 5 22 Q 10 28 15 35" fill="#003DA5" stroke="#003DA5" stroke-width="2"/>
            <!-- Right hand (light blue) -->
            <path d="M 80 30 Q 85 20 90 15 Q 92 12 95 15 Q 97 18 95 22 Q 90 28 85 35" fill="#1E90FF" stroke="#1E90FF" stroke-width="2"/>
            <!-- Grip area -->
            <ellipse cx="50" cy="35" rx="20" ry="15" fill="#1E90FF" opacity="0.7"/>
            <ellipse cx="50" cy="35" rx="15" ry="10" fill="#003DA5" opacity="0.7"/>
          </g>
        </svg>
      </div>
      <h2 class="brand-title">Co-op Education</h2>
      <p class="brand-subtitle">Professional co-op education platform for students, coordinators, and employers.</p>
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-right">
      <div class="login-card">
        <h1>Sign In</h1>
        <p class="form-subtitle">Enter your credentials to access your account</p>
        
        <form id="loginForm">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="input-group password-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="••••••••" required>
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">Show</button>
            </div>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>

          <button type="submit" class="login-btn">Sign In</button>

          <div id="successMessage" class="success-message" style="display: none;">
            ✓ Login successful!
          </div>

          <p class="switch-text">
            Don't have an account? <a href="register.html">Create one here</a>
          </p>
        </form>

        <p class="terms-text">By signing in, you agree to our Terms of Service and Privacy Policy</p>
      </div>
    </div>
  </div>

  <script src="../assets/js/login.js"></script>
</body>
</html>
